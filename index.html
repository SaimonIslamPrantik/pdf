<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PDF Page Numberer</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/pdf-lib@1.17.1/dist/pdf-lib.min.js"></script>
    <script src="https://unpkg.com/@pdf-lib/fontkit@0.0.4/dist/fontkit.umd.min.js"></script>
    
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0&display=swap" rel="stylesheet">
    
    <style>
        body {
            font-family: system-ui, -apple-system, sans-serif;
            background-color: #f7f2fa; /* Material 3 Light Surface Variant */
            color: #1d1b20; /* Material 3 On Surface */
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4 sm:p-6">

    <div class="w-full max-w-xl bg-[#fffbfe] rounded-[28px] p-6 sm:p-8 shadow-md border border-[#e7e0ec]">
        
        <div class="flex items-center gap-3 mb-6">
            <span class="material-symbols-outlined text-[#6750a4] text-3xl">picture_as_pdf</span>
            <div>
                <h1 class="text-2xl font-semibold tracking-tight text-[#1d1b20]">PDF Page Numberer</h1>
                <p class="text-sm text-[#49454f]">Add local typography page numbers to your document.</p>
            </div>
        </div>

        <hr class="border-[#e7e0ec] mb-6">

        <div class="space-y-6">
            
            <div>
                <label class="block text-sm font-medium text-[#49454f] mb-2">Select PDF File</label>
                <label class="flex flex-col items-center justify-center w-full h-32 border-2 border-dashed border-[#79747e] rounded-xl cursor-pointer bg-[#f7f2fa] hover:bg-[#e8def8] transition-colors group">
                    <div class="flex flex-col items-center justify-center pt-5 pb-6 text-center px-4">
                        <span class="material-symbols-outlined text-[#49454f] group-hover:text-[#6750a4] mb-2 text-3xl">upload_file</span>
                        <p id="file-name" class="text-sm text-[#49454f] font-medium truncate max-w-xs">Click to upload or drag & drop</p>
                        <p class="text-xs text-[#49454f] mt-1">PDF files only</p>
                    </div>
                    <input id="pdf-upload" type="file" accept="application/pdf" class="hidden" />
                </label>
            </div>

            <div>
                <label for="position" class="block text-sm font-medium text-[#49454f] mb-2">Number Position</label>
                <div class="relative">
                    <select id="position" class="w-full bg-[#f7f2fa] border border-[#79747e] text-[#1d1b20] rounded-xl px-4 py-3 appearance-none focus:outline-none focus:border-[#6750a4] focus:ring-1 focus:ring-[#6750a4] transition-all">
                        <option value="top-left">Top Left</option>
                        <option value="top-center">Top Center</option>
                        <option value="top-right">Top Right</option>
                        <option value="bottom-left">Bottom Left</option>
                        <option value="bottom-center" selected>Bottom Center</option>
                        <option value="bottom-right">Bottom Right</option>
                    </select>
                    <div class="pointer-events-none absolute inset-y-0 right-0 flex items-center px-4 text-[#49454f]">
                        <span class="material-symbols-outlined">arrow_drop_down</span>
                    </div>
                </div>
            </div>

            <div>
                <label for="font-family" class="block text-sm font-medium text-[#49454f] mb-2">Font Style</label>
                <div class="relative">
                    <select id="font-family" class="w-full bg-[#f7f2fa] border border-[#79747e] text-[#1d1b20] rounded-xl px-4 py-3 appearance-none focus:outline-none focus:border-[#6750a4] focus:ring-1 focus:ring-[#6750a4] transition-all">
                        <option value="fonts/Calluna.ttf">Calluna</option>
                        <option value="fonts/Poppins.ttf" selected>Poppins</option>
                        <option value="fonts/GoogleSansFlex.ttf">Google Sans Flex</option>
                        <option value="fonts/Arial.ttf">Arial</option>
                    </select>
                    <div class="pointer-events-none absolute inset-y-0 right-0 flex items-center px-4 text-[#49454f]">
                        <span class="material-symbols-outlined">arrow_drop_down</span>
                    </div>
                </div>
            </div>

            <button id="process-btn" class="w-full bg-[#6750a4] hover:bg-[#533d8b] text-white font-medium py-3 px-6 rounded-full shadow-sm hover:shadow-md transition-all flex items-center justify-center gap-2 disabled:opacity-50 disabled:pointer-events-none" disabled>
                <span class="material-symbols-outlined text-sm">auto_awesome</span>
                <span id="btn-text">Process & Export PDF</span>
            </button>

        </div>
    </div>

    <script>
        const fileInput = document.getElementById('pdf-upload');
        const fileNameDisplay = document.getElementById('file-name');
        const processBtn = document.getElementById('process-btn');
        const btnText = document.getElementById('btn-text');
        const positionSelect = document.getElementById('position');
        const fontSelect = document.getElementById('font-family');

        let selectedFile = null;

        fileInput.addEventListener('change', (e) => {
            if (e.target.files.length > 0) {
                selectedFile = e.target.files[0];
                fileNameDisplay.textContent = selectedFile.name;
                processBtn.removeAttribute('disabled');
            } else {
                selectedFile = null;
                fileNameDisplay.textContent = "Click to upload or drag & drop";
                processBtn.setAttribute('disabled', 'true');
            }
        });

        processBtn.addEventListener('click', async () => {
            if (!selectedFile) return;

            processBtn.setAttribute('disabled', 'true');
            btnText.textContent = "Loading Local Font & PDF Engine...";

            try {
                // Read uploaded user PDF
                const arrayBuffer = await selectedFile.arrayBuffer();
                const pdfDoc = await PDFLib.PDFDocument.load(arrayBuffer);
                
                // Inject the font kit engine
                pdfDoc.registerFontkit(fontkit);

                // Fetch target local binary file path selected from drop-down menu
                const fontPath = fontSelect.value;
                const fontResponse = await fetch(fontPath);
                
                if (!fontResponse.ok) {
                    throw new Error(`Failed to load font asset at ${fontPath}. Verify the file exists in your fonts folder.`);
                }
                
                const fontBytes = await fontResponse.arrayBuffer();
                const pdfFont = await pdfDoc.embedFont(fontBytes);

                const pages = pdfDoc.getPages();
                const margin = 35; 
                const fontSize = 11;

                pages.forEach((page, index) => {
                    const { width, height } = page.getSize();
                    const pageNumString = String(index + 1);
                    
                    // fontkit calculates geometric sizing details depending on vector data 
                    const textWidth = pdfFont.widthOfTextAtSize(pageNumString, fontSize);
                    
                    let x = width / 2 - textWidth / 2; 
                    let y = margin; 

                    const pos = positionSelect.value;
                    if (pos.includes('left')) {
                        x = margin;
                    } else if (pos.includes('right')) {
                        x = width - margin - textWidth;
                    } else if (pos.includes('center')) {
                        x = (width / 2) - (textWidth / 2);
                    }

                    if (pos.includes('top')) {
                        y = height - margin;
                    } else if (pos.includes('bottom')) {
                        y = margin;
                    }

                    page.drawText(pageNumString, {
                        x: x,
                        y: y,
                        size: fontSize,
                        font: pdfFont,
                        color: PDFLib.rgb(0.29, 0.27, 0.31), // Material 3 On-Surface-Variant Tone
                    });
                });

                // Compile modifications and serve file payload string sequence
                const pdfBytes = await pdfDoc.save();
                const blob = new Blob([pdfBytes], { type: "application/pdf" });
                const link = document.createElement('a');
                
                const originalName = selectedFile.name.replace(/\.[^/.]+$/, "");
                link.href = window.URL.createObjectURL(blob);
                link.download = `${originalName}_finalized.pdf`;
                link.click();

            } catch (error) {
                console.error(error);
                alert(error.message || "An error occurred. Check browser development console log notes.");
            } finally {
                processBtn.removeAttribute('disabled');
                btnText.textContent = "Process & Export PDF";
            }
        });
    </script>
</body>
</html>
